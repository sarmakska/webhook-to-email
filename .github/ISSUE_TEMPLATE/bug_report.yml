name: Bug report
description: Report a bug or unexpected behaviour
title: "[Bug] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: Thanks for taking the time to file a bug report. Please fill in the sections below.
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of what went wrong.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: How can it be reproduced?
      description: Steps to reproduce the behaviour. A minimal repro is best.
      placeholder: |
        1. Run ...
        2. Click on ...
        3. See error
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Environment
      description: OS, runtime version, package version
    validations:
      required: false
