services:
  webhook-to-email:
    build: .
    image: webhook-to-email:latest
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - .env
    volumes:
      # Persist the dead-letter inbox across restarts and redeploys.
      - webhook-data:/app/data
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  webhook-data:
